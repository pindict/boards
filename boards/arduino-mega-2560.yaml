tags: [classic, many-io, robotics]
notes: |
  デジタル 54本 (PWM 15本)、アナログ 16本、USART 4ch。
  Hardware Serial: Serial(0), Serial1(18/19), Serial2(16/17), Serial3(14/15)。
  I2C = 20(SDA)/21(SCL)、SPI = 50(MISO)/51(MOSI)/52(SCK)/53(SS)。
