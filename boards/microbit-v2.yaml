      warnings: ["内蔵センサ I2C と共有"] }
  - { index: 20, label: "3V",   gpio: null, x: 360, y: 268, side: right, kind: power,
      warnings: ["大型リング、最大 200mA"] }
  - { index: 21, label: "GND",  gpio: null, x: 360, y: 306, side: right, kind: ground,
      warnings: ["大型リング"] }
