schema_version: 1
id: raspberry-pi-zero-2-w
name: Raspberry Pi Zero 2 W
aliases: [Pi Zero 2, RPi Zero 2 W]
manufacturer: Raspberry Pi
family: raspberry-pi
mcu:
  chip: RP3A0 (BCM2710A1)
  core: ARM Cortex-A53 quad-core
  clock_mhz: 1000
  sram_kb: 524288
voltage:
  logic: 3.3
  input_min: 5.0
  input_max: 5.25
pinout:
  svg: ""
  viewbox: { w: 220, h: 820 }
tags: [linux, sbc, wifi, small]
notes: |
  Pi Zero v1.3 と同サイズ・同ピン配列で、4コア化と Wi-Fi/BT 内蔵。
  GPIO ヘッダは Pi 4B と互換 (3.3V ロジック、5V トレラント不可)。
pins:
